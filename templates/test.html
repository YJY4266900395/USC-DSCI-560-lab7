<!DOCTYPE html>
<html>
<head>
    <title>Test Panel</title>
    <style>
        body { font-family: system-ui; background: #0f172a; color: #e2e8f0; padding: 40px; }
        h1 { color: #f59e0b; }
        h3 { margin-top: 20px; }
        .btn { padding: 10px 20px; margin: 6px; border: none; border-radius: 6px;
               font-size: 14px; cursor: pointer; font-weight: 600; }
        .btn-move { background: #3b82f6; color: white; }
        .btn-move:hover { background: #2563eb; }
        .log { background: #1e293b; padding: 16px; border-radius: 8px; margin-top: 20px;
               font-family: monospace; font-size: 13px; max-height: 300px; overflow-y: auto; }
        select, input { background: #1e293b; color: #e2e8f0; border: 1px solid #334155;
                        padding: 8px 12px; border-radius: 6px; margin: 4px; font-size: 14px; }
        a { color: #3b82f6; }
    </style>
</head>
<body>
    <h1>🧪 Test Panel</h1>
    <p>Simulate device movement to test geofence notifications and email alerts.
       <a href="/">← Back to main map</a>
    </p>

    <div>
        <label>Device:
            <select id="dev">
                {% for device in devices %}
                <option value="{{ device.name }}">{{ device.name }}</option>
                {% endfor %}
            </select>
        </label>
    </div>

    <h3>Quick Teleport</h3>
    <button class="btn btn-move" onclick="move('USC Campus', 34.0224, -118.2851)">📍 USC</button>
    <button class="btn btn-move" onclick="move('Santa Monica', 34.0095, -118.4970)">🏖 Santa Monica</button>
    <button class="btn btn-move" onclick="move('Koreatown', 34.0578, -118.3004)">🍜 Koreatown</button>
    <button class="btn btn-move" onclick="move('Away (middle of nowhere)', 34.5, -118.0)">🏜 Far Away</button>

    <h3>Custom Location</h3>
    <input id="clat" type="number" step="0.0001" placeholder="Latitude" value="34.0224">
    <input id="clon" type="number" step="0.0001" placeholder="Longitude" value="-118.2851">
    <button class="btn btn-move" onclick="moveCustom()">Move Here</button>

    <div class="log" id="log">Ready...</div>

    <script>
        function log(msg) {
            const el = document.getElementById('log');
            el.innerHTML = new Date().toLocaleTimeString() + ' - ' + msg + '<br>' + el.innerHTML;
        }

        async function move(label, lat, lon) {
            const name = document.getElementById('dev').value;
            const resp = await fetch('/api/test/move', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name, lat, lon})
            });
            const data = await resp.json();
            log('Moved <b>' + name + '</b> to <b>' + label + '</b> (' + lat + ', ' + lon + ') → ' + JSON.stringify(data.triggered));
        }

        function moveCustom() {
            const lat = parseFloat(document.getElementById('clat').value);
            const lon = parseFloat(document.getElementById('clon').value);
            move('Custom (' + lat + ', ' + lon + ')', lat, lon);
        }
    </script>
</body>
</html>
