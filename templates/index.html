<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trojan Trio - Live Location Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            overflow: hidden;
        }

        /* ---- Layout ---- */
        .app-container {
            display: grid;
            grid-template-columns: 340px 1fr;
            grid-template-rows: 60px 1fr;
            height: 100vh;
            position: relative;
        }

        /* ---- Top Bar ---- */
        .top-bar {
            grid-column: 1 / -1;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            border-bottom: 1px solid #334155;
            z-index: 1000;
        }
        .top-bar h1 { font-size: 18px; font-weight: 600; color: #f1f5f9; }
        .top-bar h1 span { color: #f59e0b; }
        .status-badge { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #94a3b8; }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; background: #22c55e;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* ---- Sidebar ---- */
        .sidebar {
            background: #1e293b;
            border-right: 1px solid #334155;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow: hidden;
        }
        .section-title {
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1.2px; color: #64748b; margin-bottom: 4px;
        }

        /* Device cards */
        .device-card {
            background: #0f172a; border: 1px solid #334155; border-radius: 10px;
            padding: 14px; transition: border-color 0.2s;
        }
        .device-card:hover { border-color: #f59e0b; }
        .device-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .device-avatar {
            width: 36px; height: 36px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: #0f172a;
        }
        .device-name { font-weight: 600; font-size: 15px; }
        .device-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 12px; color: #94a3b8; }
        .device-meta span { display: flex; align-items: center; gap: 4px; }
        #device-list {
            max-height: 400px;
            overflow-y: auto;
        }

        /* ---- Notification section in sidebar (keep original look) ---- */
        .notif-header {
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
        }
        .notif-header .section-title { cursor: pointer; }
        .notif-clear-btn {
            font-size: 11px; color: #64748b; background: none; border: 1px solid #334155;
            border-radius: 6px; padding: 3px 10px; cursor: pointer; transition: all 0.2s;
        }
        .notif-clear-btn:hover { color: #f59e0b; border-color: #f59e0b; }

        .notif-panel {
            flex: 1;
            min-height: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .notif-preview-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            flex: 1;
            min-height: 0;
        }
        .notif-item {
            background: #0f172a; border-left: 3px solid #22c55e;
            border-radius: 0 8px 8px 0; padding: 10px 12px; font-size: 13px;
            cursor: pointer; transition: background 0.15s;
        }
        .notif-item:hover { background: #1a2540; }
        .notif-item.depart { border-left-color: #ef4444; }
        .notif-item .notif-time { font-size: 11px; color: #64748b; margin-top: 4px; }

        .notif-empty {
            text-align: center; color: #475569; font-size: 13px; padding: 20px;
        }


        /* ---- Expanded Notification Bar (right of sidebar) ---- */
        .notif-expand-bar {
            position: fixed;
            top: 60px;
            left: 340px;
            width: 340px;
            bottom: 0;
            background: #1e293b;
            border-right: 1px solid #334155;
            z-index: 900;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 24px rgba(0,0,0,0.4);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }
        .notif-expand-bar.open {
            opacity: 1;
            visibility: visible;
        }

        .notif-expand-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 16px 12px; border-bottom: 1px solid #334155;
        }
        .notif-expand-header .section-title { margin-bottom: 0; }
        .notif-expand-close {
            font-size: 16px; color: #64748b; background: none; border: 1px solid #334155;
            border-radius: 6px; padding: 2px 8px; cursor: pointer; transition: all 0.2s; line-height: 1;
        }
        .notif-expand-close:hover { color: #f59e0b; border-color: #f59e0b; }

        .notif-expand-list {
            flex: 1; overflow-y: auto; padding: 12px 16px; display: flex;
            flex-direction: column; gap: 6px;
        }

        /* Items in expanded bar use same style as sidebar */
        .notif-expand-list .notif-item { cursor: default; }
        .notif-expand-list .notif-item:hover { background: #0f172a; }

        /* ---- Toast Popup (bottom right) ---- */
        .toast-container {
            position: fixed; bottom: 24px; right: 24px; z-index: 3000;
            display: flex; flex-direction: column; gap: 8px; pointer-events: none;
        }
        .toast {
            background: #1e293b; border: 1px solid #334155; border-left: 4px solid #22c55e;
            border-radius: 0 10px 10px 0; padding: 14px 20px; font-size: 14px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5); pointer-events: auto; cursor: pointer;
            animation: toastIn 0.4s ease, toastOut 0.4s ease 4.6s forwards; max-width: 380px;
        }
        .toast.depart { border-left-color: #ef4444; }
        .toast .toast-time { font-size: 11px; color: #64748b; margin-top: 4px; }
        @keyframes toastIn { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
        @keyframes toastOut { from{opacity:1} to{opacity:0;transform:translateY(10px)} }

        /* ---- Geofence add form ---- */
        .add-geofence-section {
            background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 14px;
        }
        .add-geofence-section input, .add-geofence-section select {
            width: 100%; background: #1e293b; border: 1px solid #334155; border-radius: 6px;
            padding: 8px 10px; color: #e2e8f0; font-size: 13px; margin-top: 6px;
        }
        .add-geofence-section input:focus { outline: none; border-color: #f59e0b; }
        .add-geofence-section label { font-size: 12px; color: #94a3b8; display: block; margin-top: 8px; }
        .add-geofence-btn {
            width: 100%; margin-top: 12px; padding: 9px; background: #f59e0b; color: #0f172a;
            border: none; border-radius: 6px; font-weight: 600; font-size: 13px; cursor: pointer;
            transition: background 0.2s;
        }
        .add-geofence-btn:hover { background: #d97706; }
        .hint-text { font-size: 11px; color: #64748b; margin-top: 6px; }

        /* ---- Map ---- */
        #map { width: 100%; height: 100%; }

        .device-tooltip {
            background: #1e293b; border: 1px solid #334155; border-radius: 8px;
            padding: 10px 14px; color: #e2e8f0; font-size: 13px; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .device-tooltip .tt-name { font-weight: 700; margin-bottom: 4px; }
        .device-tooltip .tt-meta { font-size: 11px; color: #94a3b8; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Top Bar -->
    <div class="top-bar">
        <h1>Trojan Trio <span>Live Tracker</span></h1>
        <div class="status-badge">
            <div class="status-dot"></div>
            <span id="poll-status">Connecting...</span>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <!-- Device list -->
        <div>
            <div class="section-title">Devices</div>
            <div id="device-list">
                <div class="notif-empty">Waiting for data...</div>
            </div>
        </div>

        <!-- Notifications (original inline style) -->
        <div class="notif-panel">
            <div class="notif-header">
                <div class="section-title" onclick="toggleExpandBar()">Notifications</div>
                <button class="notif-clear-btn" onclick="clearNotifications()">Clear</button>
            </div>
            <div class="notif-preview-list" id="notif-preview" onclick="toggleExpandBar()">
                <div class="notif-empty">No notifications yet</div>
            </div>
        </div>

        <!-- Add Geofence -->
        <div class="add-geofence-section">
            <div class="section-title">Add Geofence</div>
            <label>Name
                <input type="text" id="gf-name" placeholder="e.g. My Home">
            </label>
            <label>Radius (meters)
                <input type="number" id="gf-radius" value="200" min="50" max="5000">
            </label>
            <div class="hint-text">Click on the map to set location, then click Add.</div>
            <button class="add-geofence-btn" onclick="addGeofence()">+ Add Geofence</button>
        </div>
    </div>

    <!-- Map -->
    <div id="map"></div>
</div>

<!-- Expanded Notification Bar (slides out right of sidebar) -->
<div class="notif-expand-bar" id="notif-expand-bar">
    <div class="notif-expand-header">
        <div class="section-title">All Notifications</div>
        <button class="notif-expand-close" onclick="toggleExpandBar()">x</button>
    </div>
    <div class="notif-expand-list" id="notif-expand-list">
        <div class="notif-empty">No notifications yet</div>
    </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="static/scripts.js"></script>
</body>
</html>
